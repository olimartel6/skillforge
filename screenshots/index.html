<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skilly - App Store Screenshots</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: #fff;
    min-height: 100vh;
  }

  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(17,17,17,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #333;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .controls h1 {
    font-size: 20px;
    font-weight: 800;
    color: #FF6B35;
    margin-right: auto;
  }

  .tab-group {
    display: flex;
    gap: 4px;
    background: #222;
    border-radius: 10px;
    padding: 3px;
  }

  .tab-group button {
    background: transparent;
    border: none;
    color: #888;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .tab-group button.active {
    background: #FF6B35;
    color: #fff;
  }

  .tab-group button:hover:not(.active) {
    color: #fff;
  }

  .gallery {
    display: flex;
    gap: 32px;
    padding: 40px 24px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
  }

  /* Each screenshot container at exact App Store 6.7" ratio */
  .screenshot-wrapper {
    flex-shrink: 0;
    scroll-snap-align: center;
  }

  .screenshot {
    width: 430px;
    height: 932px;
    border-radius: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Gradient backgrounds per screenshot */
  .screenshot.s1 { background: linear-gradient(170deg, #1a0a00 0%, #0a0a0b 40%, #1a0800 100%); }
  .screenshot.s2 { background: linear-gradient(170deg, #0d0a15 0%, #0a0a0b 40%, #0a1010 100%); }
  .screenshot.s3 { background: linear-gradient(170deg, #0a100d 0%, #0a0a0b 40%, #15100a 100%); }
  .screenshot.s4 { background: linear-gradient(170deg, #100a15 0%, #0a0a0b 40%, #0a0d15 100%); }
  .screenshot.s5 { background: linear-gradient(170deg, #150d0a 0%, #0a0a0b 40%, #0a150d 100%); }
  .screenshot.s6 { background: linear-gradient(170deg, #15100a 0%, #0a0a0b 40%, #150a0d 100%); }

  .headline-area {
    padding: 48px 32px 24px;
    text-align: center;
    flex-shrink: 0;
  }

  .headline-area h2 {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, #ddd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .headline-area .sub {
    font-size: 15px;
    color: #FF6B35;
    font-weight: 600;
    margin-top: 8px;
  }

  /* Phone frame */
  .phone-frame {
    width: 340px;
    height: 700px;
    border-radius: 36px;
    border: 3px solid #333;
    background: #0a0a0b;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    flex-shrink: 0;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #0a0a0b;
    border-radius: 0 0 18px 18px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 38px 16px 16px;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px 8px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }

  .status-bar .right {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  /* ===== SCREEN 1: HERO ===== */
  .screen-hero .hero-logo {
    text-align: center;
    margin: 24px 0 16px;
  }

  .screen-hero .hero-logo .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #FF6B35, #FF8F60);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 8px;
  }

  .screen-hero .hero-logo h3 {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
  }

  .screen-hero .hero-logo p {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .screen-hero .hero-cta {
    background: linear-gradient(135deg, #FF6B35, #FF8F60);
    border: none;
    color: #fff;
    padding: 14px 32px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    margin: 12px auto;
    display: block;
    width: 80%;
    text-align: center;
  }

  .screen-hero .hero-features {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
    padding: 0 8px;
  }

  .screen-hero .hf-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .screen-hero .hf-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,107,53,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .screen-hero .hf-text h4 {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .screen-hero .hf-text p {
    font-size: 10px;
    color: #888;
    margin-top: 1px;
  }

  /* ===== SCREEN 2: SKILLS ===== */
  .screen-skills .skills-search {
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .screen-skills .skills-search span {
    color: #666;
    font-size: 13px;
  }

  .screen-skills .cat-label {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 10px 0 8px 4px;
  }

  .screen-skills .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .screen-skills .skill-card {
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 14px 8px 10px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .screen-skills .skill-card .sk-icon {
    font-size: 26px;
    margin-bottom: 6px;
  }

  .screen-skills .skill-card .sk-name {
    font-size: 10px;
    font-weight: 600;
    color: #ccc;
  }

  .screen-skills .skill-card.popular {
    border-color: rgba(255,107,53,0.3);
    background: rgba(255,107,53,0.08);
  }

  .screen-skills .skill-card.popular .sk-name {
    color: #FF6B35;
  }

  /* ===== SCREEN 3: AI FEEDBACK ===== */
  .screen-ai .ai-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .screen-ai .ai-avatar {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, #FF6B35, #FF8F60);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .screen-ai .ai-name h4 {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  .screen-ai .ai-name p {
    font-size: 10px;
    color: #4ade80;
    font-weight: 600;
  }

  .screen-ai .ai-skill-badge {
    margin-left: auto;
    background: rgba(255,107,53,0.15);
    color: #FF6B35;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
  }

  .screen-ai .ai-content-area {
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 10px;
  }

  .screen-ai .ai-drawing-area {
    width: 100%;
    height: 120px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    margin-bottom: 10px;
    border: 1px dashed rgba(255,255,255,0.1);
  }

  .screen-ai .ai-drawing-area .sketch-lines {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    opacity: 0.3;
  }

  .screen-ai .ai-bubble {
    background: rgba(255,107,53,0.1);
    border-radius: 14px;
    padding: 12px 14px;
    border: 1px solid rgba(255,107,53,0.15);
  }

  .screen-ai .ai-bubble p {
    font-size: 12px;
    color: #ddd;
    line-height: 1.5;
  }

  .screen-ai .ai-bubble .highlight {
    color: #FF6B35;
    font-weight: 700;
  }

  .screen-ai .ai-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .screen-ai .ai-actions button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 11px;
    font-weight: 600;
    font-family: inherit;
  }

  .screen-ai .ai-actions button.primary {
    background: linear-gradient(135deg, #FF6B35, #FF8F60);
    border: none;
    color: #fff;
  }

  .screen-ai .ai-score {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 12px;
    padding: 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
  }

  .screen-ai .ai-score .score-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 3px solid #FF6B35;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #FF6B35;
  }

  .screen-ai .ai-score .score-text {
    font-size: 11px;
    color: #888;
    line-height: 1.4;
  }

  .screen-ai .ai-score .score-text strong {
    color: #fff;
    font-size: 12px;
  }

  /* ===== SCREEN 4: MINI-GAMES ===== */
  .screen-games .games-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .screen-games .games-header h3 {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
  }

  .screen-games .streak-badge {
    background: rgba(255,107,53,0.15);
    color: #FF6B35;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
  }

  .screen-games .game-card {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .screen-games .game-card .g-icon {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .screen-games .game-card .g-icon.quiz { background: rgba(168,85,247,0.15); }
  .screen-games .game-card .g-icon.speed { background: rgba(59,130,246,0.15); }
  .screen-games .game-card .g-icon.memory { background: rgba(16,185,129,0.15); }
  .screen-games .game-card .g-icon.challenge { background: rgba(255,107,53,0.15); }

  .screen-games .game-card .g-info h4 {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .screen-games .game-card .g-info p {
    font-size: 10px;
    color: #888;
    margin-top: 2px;
  }

  .screen-games .game-card .g-info .g-xp {
    font-size: 10px;
    font-weight: 700;
    color: #FF6B35;
    margin-top: 4px;
  }

  .screen-games .game-card .g-play {
    margin-left: auto;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .screen-games .daily-challenge {
    background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,107,53,0.05));
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 16px;
    padding: 16px;
    margin-top: 4px;
    text-align: center;
  }

  .screen-games .daily-challenge h4 {
    font-size: 13px;
    font-weight: 700;
    color: #FF6B35;
    margin-bottom: 4px;
  }

  .screen-games .daily-challenge p {
    font-size: 11px;
    color: #aaa;
  }

  .screen-games .daily-challenge .dc-reward {
    display: inline-block;
    background: rgba(255,107,53,0.2);
    color: #FF6B35;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 8px;
  }

  /* ===== SCREEN 5: PROGRESS ===== */
  .screen-progress .prog-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .screen-progress .prog-avatar {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B35, #FF8F60);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .screen-progress .prog-info h3 {
    font-size: 16px;
    font-weight: 800;
    color: #fff;
  }

  .screen-progress .prog-info p {
    font-size: 11px;
    color: #888;
  }

  .screen-progress .prog-info .level-badge {
    display: inline-block;
    background: rgba(255,107,53,0.15);
    color: #FF6B35;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    margin-top: 3px;
  }

  .screen-progress .stat-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .screen-progress .stat-box {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .screen-progress .stat-box .stat-num {
    font-size: 22px;
    font-weight: 800;
    color: #FF6B35;
  }

  .screen-progress .stat-box .stat-label {
    font-size: 9px;
    color: #888;
    font-weight: 600;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .screen-progress .streak-calendar {
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .screen-progress .streak-calendar h4 {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }

  .screen-progress .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .screen-progress .cal-day {
    aspect-ratio: 1;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #555;
    font-weight: 600;
  }

  .screen-progress .cal-day.active {
    background: rgba(255,107,53,0.25);
    color: #FF6B35;
  }

  .screen-progress .cal-day.today {
    background: #FF6B35;
    color: #fff;
  }

  .screen-progress .xp-bar-section {
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .screen-progress .xp-bar-section h4 {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .screen-progress .xp-bar-section .xp-sub {
    font-size: 10px;
    color: #888;
    margin-bottom: 8px;
  }

  .screen-progress .xp-track {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 5px;
    overflow: hidden;
  }

  .screen-progress .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF6B35, #FF8F60);
    border-radius: 5px;
    width: 72%;
  }

  .screen-progress .skill-progress-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .screen-progress .sp-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .screen-progress .sp-item .sp-icon {
    font-size: 18px;
  }

  .screen-progress .sp-item .sp-bar {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .screen-progress .sp-item .sp-bar-inner {
    height: 100%;
    background: #FF6B35;
    border-radius: 3px;
  }

  .screen-progress .sp-item .sp-pct {
    font-size: 10px;
    font-weight: 700;
    color: #aaa;
    min-width: 30px;
    text-align: right;
  }

  /* ===== SCREEN 6: PREMIUM ===== */
  .screen-premium .premium-badge {
    text-align: center;
    margin: 8px 0 14px;
  }

  .screen-premium .premium-badge .crown {
    font-size: 40px;
    margin-bottom: 4px;
  }

  .screen-premium .premium-badge h3 {
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(135deg, #FF6B35, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .screen-premium .premium-badge p {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .screen-premium .prem-features {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .screen-premium .pf-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .screen-premium .pf-item .pf-check {
    width: 24px;
    height: 24px;
    border-radius: 7px;
    background: rgba(255,107,53,0.15);
    color: #FF6B35;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .screen-premium .pf-item p {
    font-size: 12px;
    color: #ccc;
    font-weight: 500;
  }

  .screen-premium .price-box {
    background: linear-gradient(135deg, rgba(255,107,53,0.12), rgba(255,215,0,0.08));
    border: 1px solid rgba(255,107,53,0.25);
    border-radius: 16px;
    padding: 18px;
    text-align: center;
  }

  .screen-premium .price-box .price {
    font-size: 32px;
    font-weight: 900;
    color: #FF6B35;
  }

  .screen-premium .price-box .price-period {
    font-size: 13px;
    color: #888;
    font-weight: 500;
  }

  .screen-premium .price-box .price-sub {
    font-size: 10px;
    color: #666;
    margin-top: 4px;
  }

  .screen-premium .prem-cta {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    background: linear-gradient(135deg, #FF6B35, #FFD700);
    border: none;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    text-align: center;
    margin-top: 12px;
    font-family: inherit;
  }

  /* Bottom nav */
  .bottom-nav {
    display: flex;
    justify-content: space-around;
    padding: 10px 0 6px;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: auto;
  }

  .bottom-nav .nav-item {
    text-align: center;
    font-size: 18px;
    opacity: 0.4;
  }

  .bottom-nav .nav-item.active {
    opacity: 1;
  }

  .bottom-nav .nav-item .nav-label {
    display: block;
    font-size: 8px;
    font-weight: 600;
    color: #888;
    margin-top: 2px;
  }

  .bottom-nav .nav-item.active .nav-label {
    color: #FF6B35;
  }

  /* Export info */
  .export-info {

function buildStatusBar() {
  return `<div class="status-bar"><span>9:41</span><div class="right"><span>5G</span><span>&#9679;&#9679;&#9679;</span></div></div>`;
}

function buildBottomNav(ui, activeIdx) {
  const items = [
    { icon: '&#127968;', label: ui.navHome },
    { icon: '&#9733;', label: ui.navSkills },
    { icon: '&#127918;', label: ui.navGames },
    { icon: '&#128200;', label: ui.navProgress },
    { icon: '&#128100;', label: ui.navProfile }
  ];
  return `<div class="bottom-nav">${items.map((it, i) =>
    `<div class="nav-item${i === activeIdx ? ' active' : ''}"><span>${it.icon}</span><span class="nav-label">${it.label}</span></div>`
  ).join('')}</div>`;
}

    ${buildStatusBar()}
    <div class="prog-header">

const screenBuilders = [buildScreen1, buildScreen2, buildScreen3, buildScreen4, buildScreen5, buildScreen6];

let currentLang = 'en';
let currentScreen = 'all';

function render() {
  const gallery = document.getElementById('gallery');
  const langData = DATA[currentLang];
  const indices = currentScreen === 'all' ? [0,1,2,3,4,5] : [parseInt(currentScreen)];

  gallery.innerHTML = indices.map(i => {
    const hl = langData.headlines[i];
    const headlineText = hl.h.replace(/\n/g, '<br>');
    return `<div class="screenshot-wrapper">
      <div class="screenshot s${i+1}">
        <div class="headline-area">
          <h2>${headlineText}</h2>
          <div class="sub">${hl.sub}</div>
        </div>
        <div class="phone-frame">
          ${screenBuilders[i](langData.ui)}
        </div>
      </div>
    </div>`;
  }).join('');
}

// Tab interactions
document.getElementById('langTabs').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#langTabs button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentLang = e.target.dataset.lang;
  render();
});

document.getElementById('screenTabs').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#screenTabs button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentScreen = e.target.dataset.screen;
  render();
});

render();
</script>
